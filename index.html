<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resource Admin Demo</title>
<style>
body{
  font-family:Arial,sans-serif;
  max-width:900px;
  margin:40px auto;
  padding:20px;
  background:#f5f5f5;
}
.card{
  background:white;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
}
button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#0B7691;
  color:white;
}
input, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>
<body>

<h1>GitHub JSON Admin Demo</h1>

<div class="card">
  <h2>Add Resource</h2>

  <input id="title" placeholder="Title">
  <textarea id="desc" placeholder="Description"></textarea>

  <button onclick="addResource()">Add Resource</button>
</div>

<div id="resources"></div>

<script>

const DATA_URL = './resources.json';

let resources = [];

async function loadResources() {
  const res = await fetch(DATA_URL);
  resources = await res.json();
  renderResources();
}

function renderResources() {
  const container = document.getElementById('resources');

  container.innerHTML = resources.map(r => `
    <div class="card">
      <h3>${r.title}</h3>
      <p>${r.desc}</p>
    </div>
  `).join('');
}

async function addResource() {

  const title = document.getElementById('title').value;
  const desc = document.getElementById('desc').value;

  const newResource = {
    id: Date.now(),
    title,
    desc
  };

  resources.push(newResource);

  const response = await fetch('/api/updateResources', {
    method:'POST',
    headers:{
      'Content-Type':'application/json'
    },
    body: JSON.stringify({
      resources
    })
  });

  const result = await response.json();

  if(result.success){
    alert('resources.json updated on GitHub');
    loadResources();
  } else {
    alert('Failed to update GitHub');
    console.log(result);
  }
}

loadResources();

</script>

</body>
</html>
